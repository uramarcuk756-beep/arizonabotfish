name: Build ArizonaFish APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip zip unzip openjdk-17-jdk \
            libffi-dev libssl-dev libjpeg-dev zlib1g-dev \
            git wget curl autoconf libtool pkg-config \
            lld llvm

      - name: Install buildozer & cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Build APK
        run: |
          set -e
          buildozer android debug
        continue-on-error: true

      - name: Find APK
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== bin/ contents ==="
          ls -la bin/ 2>/dev/null || echo "No bin/ folder"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ArizonaFish-APK
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: warn
